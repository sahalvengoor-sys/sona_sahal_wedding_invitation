<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sona & Sahal · 24 May 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500&family=Great+Vibes&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --gold: #4a6741;
      --gold-dim: #3a5232;
      --text: #2d3f29;
      --text-mid: #4a6741;
      --sage: #5a7a50;
      --border: rgba(74,103,65,0.22);
    }

    body { background: var(--bg); color: var(--text); font-family: 'EB Garamond', serif; text-align: center; margin: 0; line-height: 1.6; }
    .page { max-width: 480px; margin: 0 auto; padding-bottom: 80px; position: relative; z-index: 1; }

    /* RSVP Section Styles */
    .rsvp-input-group { margin-bottom: 25px; padding: 0 20px; }
    .rsvp-field {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      background: #fdfdfb;
      outline: none;
      color: var(--text);
    }
    .rsvp-field:focus { border-color: var(--gold); }
    
    .rsvp-link {
      display: block;
      padding: 18px 24px;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid var(--gold);
      color: var(--gold);
      margin-bottom: 10px;
      transition: 0.3s;
    }
    .rsvp-link:active { background: var(--gold); color: white; }

    /* Layout Components */
    .arch-frame { width: 240px; height: 320px; margin: 0 auto; border-radius: 120px 120px 10px 10px; overflow: hidden; border: 1px solid var(--border); }
    .arch-frame img { width: 100%; height: 100%; object-fit: cover; }
    .name-script { font-family: 'Great Vibes', cursive; font-size: 4rem; color: var(--gold); display: block; margin: 10px 0; }
    .eyebrow { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-dim); display: block; margin-top: 40px; }

    /* Countdown */
    .cd-row { display: flex; justify-content: center; gap: 15px; margin: 30px 0; font-family: 'Cinzel', serif; }
    .cd-num { font-size: 2rem; display: block; color: var(--gold); }
    .cd-lbl { font-size: 0.5rem; text-transform: uppercase; color: #888; }

    /* Music Button */
    #music-btn {
      position: fixed; bottom: 20px; right: 20px; z-index: 9999;
      background: rgba(255,255,255,0.9); border: 1px solid var(--border);
      padding: 10px 15px; font-family: 'Cinzel', serif; font-size: 0.6rem;
      border-radius: 30px; cursor: pointer;
    }
  </style>
</head>
<body>

  <button id="music-btn" onclick="toggleMusic()">🔊 Atmosphere</button>
  <audio id="bgm" loop>
    <source src="https://cdns-preview-4.dzcdn.net/stream/c-4df8d43d1a8e6f77341764619d08e5e1-3.mp3" type="audio/mpeg">
  </audio>

  <div class="page">
    <span class="eyebrow">The Wedding Reception of</span>
    <div class="arch-frame">
      <img src="IMG_9900.jpg" alt="Sona and Sahal">
    </div>

    <div class="names-block">
      <span class="name-script">Sona</span>
      <span style="font-style: italic; font-size: 1.2rem;">and</span>
      <span class="name-script">Sahal</span>
    </div>

    <div class="cd-row">
      <div><span class="cd-num" id="d">00</span><span class="cd-lbl">Days</span></div>
      <div><span class="cd-num" id="h">00</span><span class="cd-lbl">Hrs</span></div>
      <div><span class="cd-num" id="m">00</span><span class="cd-lbl">Mins</span></div>
    </div>

    <p style="font-style: italic; color: #666; margin: 40px 20px;">"No chance. No coincidence. Only what was always written, now unfolding."</p>

    <section id="rsvp" style="padding: 40px 0; background: #f9f9f7;">
      <span class="eyebrow">RSVP</span>
      <h2 style="font-family: 'Cinzel'; font-weight: 300; margin-bottom: 20px;">Kindly Respond</h2>
      
      <div class="rsvp-input-group">
        <input type="text" id="guestName" class="rsvp-field" placeholder="Your Name(s)">
        <select id="guestCount" class="rsvp-field">
          <option value="1">1 Guest</option>
          <option value="2">2 Guests</option>
          <option value="3">3 Guests</option>
          <option value="4">4 Guests</option>
          <option value="5">5+ Guests</option>
        </select>
      </div>

      <div style="padding: 0 20px;">
        <a href="javascript:void(0)" onclick="sendRSVP('100% In')" class="rsvp-link">✓ 100% In</a>
        <a href="javascript:void(0)" onclick="sendRSVP('Trying my best')" class="rsvp-link" style="border-color:#888; color:#888;">◌ Almost There</a>
      </div>
    </section>
  </div>

  <script>
    // Music Toggle
    function toggleMusic() {
      const a = document.getElementById('bgm');
      const btn = document.getElementById('music-btn');
      if (a.paused) {
        a.play();
        btn.innerText = "⏸ Pause";
      } else {
        a.pause();
        btn.innerText = "🔊 Atmosphere";
      }
    }

    // RSVP Logic
    function sendRSVP(status) {
      const name = document.getElementById('guestName').value || "A Guest";
      const count = document.getElementById('guestCount').value;
      const phone = "919746321310"; // Your WhatsApp Number
      
      const text = `Hi! This is ${name} (Total: ${count}). We are ${status} for Sona and Sahal's reception!`;
      const encodedText = encodeURIComponent(text);
      
      window.open(`https://wa.me/${phone}?text=${encodedText}`, '_blank');
    }

    // Countdown
    const target = new Date("May 24, 2026 11:00:00").getTime();
    setInterval(() => {
      const now = new Date().getTime();
      const diff = target - now;
      document.getElementById('d').innerText = Math.floor(diff / 86400000);
      document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
      document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
    }, 1000);
  </script>
</body>
</html>
